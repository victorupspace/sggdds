<script>
  (function () {
    var INTRO_ID = 'documentation-introdução--docs';
    var INTRO_PATH = '/docs/' + INTRO_ID;

    try {
      var EXPANDED_KEY = '@storybook/ui/store';
      var FLAG_KEY = 'sggd-ds-initial-expand-v3';
      if (!localStorage.getItem(FLAG_KEY)) {
        var raw = localStorage.getItem(EXPANDED_KEY);
        var state = raw ? JSON.parse(raw) : {};
        state.expanded = state.expanded || {};
        state.expanded['documentation'] = true;
        state.expanded['foundations'] = true;
        state.expanded['web-components'] = true;
        localStorage.setItem(EXPANDED_KEY, JSON.stringify(state));
        localStorage.setItem(FLAG_KEY, '1');
      }
    } catch (e) {}

    function getQuery(name) {
      var search = window.location.search || '';
      var pairs = search.replace(/^\?/, '').split('&');
      for (var i = 0; i < pairs.length; i++) {
        var pair = pairs[i].split('=');
        if (decodeURIComponent(pair[0]) === name) {
          return decodeURIComponent(pair.slice(1).join('='));
        }
      }
      return null;
    }

    function shouldRedirect() {
      var path = getQuery('path');
      var id = getQuery('id');
      if (!path && !id) return true;
      if (path === '/' || path === '') return true;
      return false;
    }

    function redirect() {
      var search = window.location.search || '';
      var hasPath = /[?&]path=/.test(search);
      var newSearch;
      if (!search || search === '?') {
        newSearch = '?path=' + encodeURIComponent(INTRO_PATH);
      } else if (hasPath) {
        newSearch = search.replace(
          /([?&])path=[^&]*/,
          '$1path=' + encodeURIComponent(INTRO_PATH),
        );
      } else {
        newSearch = search + '&path=' + encodeURIComponent(INTRO_PATH);
      }
      var target =
        window.location.protocol +
        '//' +
        window.location.host +
        window.location.pathname +
        newSearch +
        window.location.hash;
      window.location.replace(target);
    }

    if (shouldRedirect()) {
      redirect();
    }
  })();
</script>
